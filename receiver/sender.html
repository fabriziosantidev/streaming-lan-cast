<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Streaming LAN Cast: web sender</title>
<script src="https://www.gstatic.com/cast/sdk/libs/sender/1.0/cast_sender.js?loadCastFramework=1"></script>
<style>
  body { margin: 0; min-height: 100vh; background: #16181c; color: #e6e6e6;
         font-family: system-ui, sans-serif; display: flex; flex-direction: column;
         align-items: center; justify-content: center; gap: 16px; padding: 24px; }
  img { width: 96px; height: 96px; }
  h1 { margin: 0; color: #fff; font-size: 24px; }
  p { margin: 0; color: #8a8f98; text-align: center; max-width: 420px; }
  .row { display: flex; gap: 10px; align-items: center; margin-top: 8px; width: 100%; max-width: 420px; }
  input { flex: 1; padding: 9px 10px; border-radius: 8px; border: 1px solid #2a2e35;
          background: #1c1f24; color: #e6e6e6; font: 13px monospace; }
  button { padding: 9px 16px; border: 0; border-radius: 8px; background: #2563eb;
           color: #fff; font-weight: 600; cursor: pointer; }
  google-cast-launcher { width: 34px; height: 34px; --disconnected-color: #8a8f98; --connected-color: #2563eb; }
  #status { color: #8a8f98; font-size: 13px; min-height: 18px; }
</style>
</head>
<body>
  <img src="icon-256.png" alt="">
  <h1>Streaming LAN Cast</h1>
  <p>A web sender for the Streaming LAN Cast receiver. Click the Cast button, pick a device, then load
  an HLS stream. The extension casts through the local helper; this page is a standalone sender.</p>

  <google-cast-launcher></google-cast-launcher>

  <div class="row">
    <input id="url" placeholder="HLS URL (.m3u8)" value="">
    <button id="cast">Cast</button>
  </div>
  <div id="status"></div>

  <script>
    const RECEIVER_APP_ID = 'C4B6F8FF';
    const status = (m) => { document.getElementById('status').textContent = m; };

    window.__onGCastApiAvailable = function (available) {
      if (!available) { status('Cast not available in this browser.'); return; }
      cast.framework.CastContext.getInstance().setOptions({
        receiverApplicationId: RECEIVER_APP_ID,
        autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED,
      });
      status('Ready. Click the Cast button to connect.');
    };

    document.getElementById('cast').addEventListener('click', async () => {
      const url = document.getElementById('url').value.trim();
      if (!url) { status('Enter an HLS (.m3u8) URL first.'); return; }
      const ctx = cast.framework.CastContext.getInstance();
      try {
        if (!ctx.getCurrentSession()) await ctx.requestSession();
        const session = ctx.getCurrentSession();
        const info = new chrome.cast.media.MediaInfo(url, 'application/vnd.apple.mpegurl');
        info.streamType = chrome.cast.media.StreamType.LIVE;
        await session.loadMedia(new chrome.cast.media.LoadRequest(info));
        status('Casting.');
      } catch (e) {
        status('Cast failed: ' + (e && e.description ? e.description : e));
      }
    });
  </script>
</body>
</html>
